<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ScoutQuest — Mobile Prototype</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --forest: #1F3A2B;
    --moss:   #2D5440;
    --moss-2: #3F6E55;
    --sand:   #EFE3C2;
    --sand-2: #E4D6B0;
    --paper:  #FAF5E6;
    --paper-2:#F3EAD0;
    --ink:    #14181A;
    --ink-2:  #4A5046;
    --orange: #E87D3E;
    --orange-d:#C9651F;
    --navy:   #1F3D5C;
    --neon:   #5BE584;
    --neon-d: #2EB85F;
    --red:    #E63946;
    --gold:   #F2C94C;

    --font-display: "Bricolage Grotesque", system-ui, sans-serif;
    --font-body:    "Manrope", system-ui, sans-serif;
    --font-mono:    "JetBrains Mono", ui-monospace, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    background:
      radial-gradient(ellipse at 20% 10%, rgba(31,58,43,.10), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(232,125,62,.10), transparent 60%),
      repeating-linear-gradient(45deg, rgba(31,58,43,.025) 0 2px, transparent 2px 8px),
      var(--sand);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  /* Topo lines on body bg */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(60% 40% at 50% 50%, transparent 60%, rgba(31,58,43,.06) 62%, transparent 64%),
      radial-gradient(50% 35% at 50% 50%, transparent 60%, rgba(31,58,43,.05) 62%, transparent 64%),
      radial-gradient(40% 28% at 50% 50%, transparent 60%, rgba(31,58,43,.04) 62%, transparent 64%);
    pointer-events: none;
    z-index: 0;
  }

  #root {
    position: relative;
    z-index: 1;
    width: 390px;
    height: 844px;
    max-height: calc(100dvh - 32px);
    border-radius: 36px;
    background: var(--paper);
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 30px 80px -30px rgba(20,24,26,.4),
      0 60px 100px -50px rgba(31,58,43,.35);
    overflow: hidden;
    isolation: isolate;
  }

  /* When viewport is smaller, scale the canvas proportionally */
  @media (max-height: 870px), (max-width: 422px) {
    #root {
      transform-origin: center center;
    }
  }

  /* ---------- common element styles consumed by JSX ---------- */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    background: var(--paper);
    overflow: hidden;
  }
  .screen-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .screen-scroll::-webkit-scrollbar { display: none; }

  .display { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .label-cap { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-2); }

  /* Big chunky primary button */
  .btn-primary {
    border: 0; cursor: pointer;
    background: var(--forest);
    color: var(--paper);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.01em;
    padding: 22px 24px;
    border-radius: 22px;
    width: 100%;
    box-shadow: 0 4px 0 #0E2218, 0 12px 24px -8px rgba(31,58,43,.5);
    transition: transform .12s ease, box-shadow .12s ease, background .15s ease;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 #0E2218, 0 6px 14px -8px rgba(31,58,43,.5); }
  .btn-primary[disabled] { opacity: .55; cursor: not-allowed; }

  .btn-ghost {
    border: 2px solid var(--forest);
    background: transparent;
    color: var(--forest);
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 16px;
    padding: 14px 18px;
    border-radius: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-ghost:active { transform: translateY(1px); }

  .btn-hint {
    background: var(--gold);
    color: var(--forest);
    border: 0;
    border-radius: 18px;
    padding: 14px 14px;
    font-family: var(--font-body); font-weight: 700; font-size: 15px;
    box-shadow: 0 3px 0 #C49B1B;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-hint:disabled { opacity: .5; }
  .btn-skip {
    background: var(--paper-2);
    color: var(--ink);
    border: 0;
    border-radius: 18px;
    padding: 14px 14px;
    font-family: var(--font-body); font-weight: 700; font-size: 15px;
    box-shadow: 0 3px 0 var(--sand-2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  /* Stat chip */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--paper-2);
    border-radius: 999px;
    padding: 6px 12px;
    font-weight: 700; font-size: 13px;
    color: var(--ink);
  }
  .chip-dark {
    background: rgba(20,24,26,.06);
  }

  /* Animations */
  @keyframes pulseRing { 0% { transform: scale(.6); opacity: .9; } 100% { transform: scale(1.8); opacity: 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }
  @keyframes pop { 0% { transform: scale(.7); opacity: 0; } 60% { transform: scale(1.06); opacity: 1; } 100% { transform: scale(1); } }
  @keyframes confettiFall {
    0% { transform: translate(0,-20px) rotate(0); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translate(var(--tx, 0), 780px) rotate(var(--rot, 540deg)); opacity: 0; }
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(10px) scale(.99); }
    to { opacity: 1; transform: none; }
  }
  @keyframes timerTick { 50% { opacity: .35; } }
  @keyframes barFill { from { width: 0; } }

  /* Hide scroll */
  .no-scrollbar::-webkit-scrollbar { display: none; }

  /* Photo placeholder stripes */
  .photo-stripes {
    background:
      repeating-linear-gradient(135deg,
        var(--moss) 0 14px,
        var(--moss-2) 14px 28px);
  }

  /* paper texture overlay for cards */
  .papery {
    background:
      repeating-linear-gradient(45deg, rgba(31,58,43,.020) 0 1px, transparent 1px 5px),
      var(--paper);
  }
  .papery-dark {
    background:
      repeating-linear-gradient(45deg, rgba(250,245,230,.025) 0 1px, transparent 1px 5px),
      var(--forest);
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script type="text/babel">
// tweaks-panel.jsx
const __TWEAKS_STYLE = `

  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}

  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;

  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const hasDeckStage = React.useMemo(() => typeof document !== 'undefined' && !!document.querySelector('deck-stage'), []);
  const [railEnabled, setRailEnabled] = React.useState(() => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled);
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => { if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true); };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => { try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; } });
  const toggleRail = (on) => { setRailVisible(on); window.postMessage({ type: '__deck_rail_visible', on }, '*'); };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = { x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)), y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)) };
    panel.style.right = offsetRef.current.x + 'px'; panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return; clampToViewport();
    if (typeof ResizeObserver === 'undefined') { window.addEventListener('resize', clampToViewport); return () => window.removeEventListener('resize', clampToViewport); }
    const ro = new ResizeObserver(clampToViewport); ro.observe(document.documentElement); return () => ro.disconnect();
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => { const t = e?.data?.type; if (t === '__activate_edit_mode') setOpen(true); else if (t === '__deactivate_edit_mode') setOpen(false); };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect(); const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right; const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable="" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck"><TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} /></TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) { return (<><div className="twk-sect">{label}</div>{children}</>); }
function TweakRow({ label, value, children, inline = false }) {
  return (<div className={inline ? 'twk-row twk-row-h' : 'twk-row'}><div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>{children}</div>);
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (<TweakRow label={label} value={`${value}${unit}`}><input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))} /></TweakRow>);
}
function TweakToggle({ label, value, onChange }) {
  return (<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button></div>);
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null); const [dragging, setDragging] = React.useState(false); const valueRef = React.useRef(value); valueRef.current = value;
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => { const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s); return m === undefined ? s : typeof m === 'object' ? m.value : m; };
    return <TweakSelect label={label} value={value} options={options} onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value)); const n = opts.length;
  const segAt = (clientX) => { const r = trackRef.current.getBoundingClientRect(); const inner = r.width - 4; const i = Math.floor(((clientX - r.left - 2) / inner) * n); return opts[Math.max(0, Math.min(n - 1, i))].value; };
  const onPointerDown = (e) => {
    setDragging(true); const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };

  return (<div className="screen papery" style={{ animation: "screenIn .4s ease" }}><div style={{ padding: "18px 22px 8px", background: "var(--forest)", color: "var(--paper)", borderRadius: "0 0 22px 22px" }}><div className="label-cap" style={{ color: "rgba(250,245,230,.55)" }}>Live</div><div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginTop: 2 }}><div className="display" style={{ fontSize: 30 }}>Ranking</div><div className="mono" style={{ fontSize: 13, color: "rgba(250,245,230,.7)", display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 6, height: 6, borderRadius: 99, background: "var(--neon)", animation: "timerTick 1.4s infinite" }}/>aktualisiert</div></div><div style={{ marginTop: 14, marginBottom: 4, display: "flex", gap: 6, flexWrap: "wrap" }}><Pill active={filter === "all"} onClick={() => setFilter("all")}>Alle Teams</Pill><Pill active={filter === "active"} onClick={() => setFilter("active")}>Aktiv</Pill><Pill active={filter === "members"} onClick={() => setFilter("members")}>Mitglieder</Pill><Pill active={filter === "guests"} onClick={() => setFilter("guests")}>Gäste</Pill></div><div style={{ marginTop: 10, display: "flex", gap: 14, fontSize: 11, color: "rgba(250,245,230,.7)", fontWeight: 600 }}><span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 99, background: "var(--neon)" }}/>aktiv</span><span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ width: 8, height: 8, borderRadius: 99, background: "#9A9A9A" }}/>beendet</span><span style={{ display: "flex", alignItems: "center", gap: 5 }}><span style={{ padding: "1px 6px", borderRadius: 5, background: "rgba(242,201,76,.22)", color: "var(--gold)", fontSize: 9, fontWeight: 800, letterSpacing: ".1em" }}>GAST</span>Gast-Team</span></div></div><div className="screen-scroll" style={{ padding: "16px 18px 18px" }}>{showPodium && (<div style={{ display: "grid", gridTemplateColumns: "1fr 1.15fr 1fr", gap: 8, marginBottom: 16, alignItems: "end" }}><Podium team={filtered[1]} place={2} h={88} color="#C2C2C2" /><Podium team={filtered[0]} place={1} h={108} color="var(--gold)" /><Podium team={filtered[2]} place={3} h={74} color="#B98559" /></div>)}{filtered.length === 0 ? (<div style={{ padding: 28, textAlign: "center", borderRadius: 16, background: "var(--paper-2)", border: "1px dashed rgba(20,24,26,.15)", color: "var(--ink-2)", fontWeight: 600 }}>Keine Teams in <b style={{ color: "var(--ink)" }}>{filterLabel}</b>.</div>) : (<div style={{ display: "flex", flexDirection: "column", gap: 8 }}>{filtered.map(t => <TeamRow key={t.rank} t={t} />)}</div>)}{isGuest && (<div style={{ marginTop: 14, padding: 14, borderRadius: 16, background: "var(--paper-2)", border: "1px dashed rgba(20,24,26,.15)", fontSize: 13, color: "var(--ink-2)", fontWeight: 600, textAlign: "center" }}>Als Gast erscheint ihr nach <b style={{ color: "var(--ink)" }}>4 gefundenen Orten</b> im Ranking.</div>)}</div></div>);
}
function Pill({ children, active, onClick }) { return (<button onClick={onClick} style={{ padding: "6px 12px", borderRadius: 99, fontSize: 12, fontWeight: 700, background: active ? "var(--paper)" : "transparent", color: active ? "var(--forest)" : "rgba(250,245,230,.7)", border: active ? "1px solid var(--paper)" : "1px solid rgba(250,245,230,.18)", cursor: "pointer", fontFamily: "inherit" }}>{children}</button>); }
function Podium({ team, place, h, color }) { return (<div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}><div style={{ width: 48, height: 48, borderRadius: "50%", background: "var(--forest)", color: "var(--paper)", display: "grid", placeItems: "center", fontFamily: "var(--font-display)", fontWeight: 800, fontSize: 20, border: `3px solid ${color}` }}>{team.name.slice(0, 1)}</div><div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 14, color: "var(--forest)" }}>{team.name}</div><div className="mono" style={{ fontSize: 13, color: "var(--ink-2)", fontWeight: 700 }}>{team.score}</div><div style={{ width: "100%", height: h, background: color, borderRadius: "10px 10px 4px 4px", display: "grid", placeItems: "start center", padding: "10px 0", color: "var(--forest)", fontFamily: "var(--font-display)", fontWeight: 800, fontSize: 22, boxShadow: "inset 0 -8px 0 rgba(20,24,26,.12)" }}>{place}</div></div>); }
function TeamRow({ t }) { return (<div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 16, background: t.you ? "var(--forest)" : "var(--paper)", color: t.you ? "var(--paper)" : "var(--ink)", border: t.you ? "0" : "1px solid rgba(20,24,26,.06)", boxShadow: t.you ? "0 8px 18px -8px rgba(31,58,43,.45)" : "0 1px 0 rgba(20,24,26,.04)" }}><div className="mono" style={{ width: 32, textAlign: "center", fontSize: 18, fontWeight: 700, color: t.you ? "var(--neon)" : "var(--ink-2)" }}>#{t.rank}</div><div style={{ width: 38, height: 38, borderRadius: 12, background: t.you ? "var(--neon)" : "var(--paper-2)", color: "var(--forest)", display: "grid", placeItems: "center", fontFamily: "var(--font-display)", fontWeight: 800, fontSize: 16 }}>{t.name.slice(0, 1)}</div><div style={{ flex: 1, minWidth: 0 }}><div style={{ display: "flex", alignItems: "center", gap: 6 }}><div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 16 }}>{t.name}</div>{t.you && <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: ".1em", padding: "2px 6px", borderRadius: 6, background: "var(--neon)", color: "var(--forest)" }}>DU</span>}{t.guest && <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: ".1em", padding: "2px 6px", borderRadius: 6, background: "rgba(242,201,76,.22)", color: t.you ? "var(--gold)" : "var(--orange-d)", border: t.you ? "1px solid rgba(242,201,76,.35)" : "1px solid rgba(232,125,62,.35)" }}>GAST</span>}<span style={{ width: 7, height: 7, borderRadius: 99, background: t.live ? "var(--neon)" : "#9A9A9A", marginLeft: "auto" }}/></div><div style={{ fontSize: 12, color: t.you ? "rgba(250,245,230,.65)" : "var(--ink-2)", fontWeight: 600, marginTop: 1 }}>{t.found} Orte · {t.time}</div></div><div className="mono" style={{ fontSize: 20, fontWeight: 700, color: t.you ? "var(--neon)" : "var(--forest)" }}>{t.score}</div></div>); }
function ProfileScreen({ groupName, score, found, total, soundOn, onToggleSound, onLogout }) {
  return (<div className="screen papery" style={{ animation: "screenIn .4s ease" }}><div style={{ padding: "20px 22px 22px", background: "var(--forest)", color: "var(--paper)", borderRadius: "0 0 22px 22px" }}><div className="label-cap" style={{ color: "rgba(250,245,230,.55)" }}>Profil</div><div style={{ display: "flex", alignItems: "center", gap: 14, marginTop: 8 }}><div style={{ width: 64, height: 64, borderRadius: 18, background: "var(--neon)", color: "var(--forest)", display: "grid", placeItems: "center", fontFamily: "var(--font-display)", fontWeight: 800, fontSize: 30 }}>{groupName.slice(0,1)}</div><div><div className="display" style={{ fontSize: 26 }}>{groupName}</div><div style={{ fontSize: 13, color: "rgba(250,245,230,.7)", fontWeight: 600 }}>{found} Orte · {score} Punkte</div></div></div></div><div className="screen-scroll" style={{ padding: "16px 18px 20px" }}><Card title="So funktioniert's"><Rule num="1" title="Foto ansehen" body="Auf dem Bild seht ihr einen Ort in eurer Stadt." /><Rule num="2" title="Hingehen" body="Lauft als Gruppe gemeinsam zu diesem Ort." /><Rule num="3" title="Bestätigen" body={'Drückt am Ort den Button \u201eWir sind da!\u201c.'} /><Rule num="4" title="Punkte holen" body={'Innerhalb von 20\u202fm gibt\u2019s Punkte \u2013 je schneller, desto mehr.'} /></Card><Card title="Punkte"><PointLine label="Ort gefunden" points="+100" good /><PointLine label="Schnell gefunden (unter 2 Min.)" points="+150" good /><PointLine label="Hinweis genutzt" points="–30" /><PointLine label="Überspringen" points="–150" bad /></Card><Card title="Einstellungen"><SettingRow icon="🔊" label="Sounds" right={<Toggle on={soundOn} onChange={onToggleSound} />} /><SettingRow icon="📍" label="GPS-Berechtigung" right={<div className="chip">Aktiv</div>} /><SettingRow icon="🌍" label="Sprache" right={<div className="chip">Deutsch</div>} /></Card><button onClick={onLogout} style={{ width: "100%", marginTop: 14, background: "transparent", border: "2px solid rgba(230,57,70,.4)", color: "var(--red)", padding: "14px 18px", borderRadius: 16, fontFamily: "var(--font-body)", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>Spiel verlassen</button></div></div>);
}
function Card({ title, children }) { return (<div style={{ background: "var(--paper)", border: "1px solid rgba(20,24,26,.06)", borderRadius: 20, padding: "14px 16px", marginBottom: 12, boxShadow: "0 1px 0 rgba(20,24,26,.03)" }}><div className="label-cap" style={{ marginBottom: 10 }}>{title}</div><div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{children}</div></div>); }
function Rule({ num, title, body }) { return (<div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}><div className="mono" style={{ width: 30, height: 30, borderRadius: 10, background: "var(--forest)", color: "var(--neon)", display: "grid", placeItems: "center", fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{num}</div><div><div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 16, color: "var(--ink)" }}>{title}</div><div style={{ fontSize: 13, color: "var(--ink-2)", fontWeight: 500, lineHeight: 1.35 }}>{body}</div></div></div>); }
function PointLine({ label, points, good, bad }) { return (<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><div style={{ fontSize: 14, fontWeight: 600 }}>{label}</div><div className="mono" style={{ fontWeight: 700, fontSize: 14, color: good ? "var(--neon-d)" : bad ? "var(--red)" : "var(--ink-2)" }}>{points}</div></div>); }
function SettingRow({ icon, label, right }) { return (<div style={{ display: "flex", alignItems: "center", gap: 12 }}><span style={{ fontSize: 22 }}>{icon}</span><div style={{ flex: 1, fontSize: 15, fontWeight: 600 }}>{label}</div>{right}</div>); }
function Toggle({ on, onChange }) { return (<button onClick={() => onChange(!on)} style={{ width: 50, height: 28, borderRadius: 99, border: 0, background: on ? "var(--neon-d)" : "rgba(20,24,26,.18)", position: "relative", cursor: "pointer", transition: "background .2s ease" }}><span style={{ position: "absolute", top: 3, left: on ? 25 : 3, width: 22, height: 22, borderRadius: 99, background: "var(--paper)", boxShadow: "0 1px 3px rgba(0,0,0,.25)", transition: "left .2s ease" }}/></button>); }
function CompleteScreen({ groupName, score, found, total, time, rank, isGuest, onOpenGuestSave, onRestart }) {
  return (<div className="screen" style={{ background: "var(--forest)", color: "var(--paper)", animation: "screenIn .4s ease" }}><Confetti /><div style={{ position: "absolute", inset: 0, background: "radial-gradient(60% 50% at 50% 30%, rgba(91,229,132,.22), transparent 60%)", pointerEvents: "none" }}/><div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "36px 24px 22px", position: "relative", zIndex: 1 }}><div className="label-cap" style={{ color: "rgba(250,245,230,.55)", textAlign: "center" }}>Spiel beendet</div><div className="display" style={{ fontSize: 44, fontWeight: 800, textAlign: "center", lineHeight: .95, marginTop: 6 }}>Geschafft,<br/><span style={{ color: "var(--neon)" }}>{groupName}!</span></div>{isGuest && (<div style={{ marginTop: 12, padding: "4px 12px", borderRadius: 99, background: "rgba(242,201,76,.18)", color: "var(--gold)", border: "1px solid rgba(242,201,76,.35)", fontSize: 11, fontWeight: 800, letterSpacing: ".12em", textTransform: "uppercase", alignSelf: "center" }}>Gast-Spiel</div>)}<div style={{ marginTop: 18, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}><BigStat label="Punkte" value={score} accent="var(--neon)" /><BigStat label="Position" value={`#${rank}`} accent="var(--gold)" /><BigStat label="Orte" value={found} accent="var(--paper)" /><BigStat label="Zeit" value={time} accent="var(--orange)" mono /></div><div style={{ flex: 1, display: "grid", placeItems: "center", margin: "4px 0" }}><div style={{ position: "relative", width: 130, height: 130 }}><div style={{ position: "absolute", inset: 0, borderRadius: "50%", background: "conic-gradient(from 220deg, var(--gold), var(--orange), var(--gold))", animation: "spin 16s linear infinite" }}/><div style={{ position: "absolute", inset: 8, borderRadius: "50%", background: "var(--forest)", display: "grid", placeItems: "center", border: "3px solid var(--gold)" }}><div style={{ textAlign: "center" }}><div style={{ fontSize: 34 }}>🏆</div><div className="display" style={{ fontSize: 12, color: "var(--gold)", letterSpacing: ".05em" }}>SILBER</div></div></div></div></div>{isGuest ? (<button className="btn-primary" onClick={onOpenGuestSave} style={{ background: "var(--neon)", color: "var(--forest)", boxShadow: "0 4px 0 #2EB85F, 0 14px 24px -8px rgba(91,229,132,.4)", fontSize: 19, padding: "18px 22px" }}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>Ergebnis sichern</button>) : (<button className="btn-primary" onClick={onRestart} style={{ background: "var(--neon)", color: "var(--forest)", boxShadow: "0 4px 0 #2EB85F, 0 14px 24px -8px rgba(91,229,132,.4)" }}>Nochmal spielen →</button>)}<button onClick={onRestart} style={{ marginTop: 8, background: "transparent", border: "2px solid rgba(250,245,230,.25)", color: "var(--paper)", padding: "14px", borderRadius: 16, fontFamily: "var(--font-body)", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>{isGuest ? "Ohne Speichern beenden" : "Ranking ansehen"}</button></div></div>);
}
function BigStat({ label, value, accent, mono }) { return (<div style={{ background: "rgba(250,245,230,.07)", border: "1px solid rgba(250,245,230,.15)", borderRadius: 16, padding: "12px 14px" }}><div style={{ fontSize: 10, color: "rgba(250,245,230,.55)", letterSpacing: ".12em", textTransform: "uppercase", fontWeight: 700 }}>{label}</div><div className={mono ? "mono" : "display"} style={{ fontSize: 28, color: accent, fontWeight: 800, marginTop: 2, lineHeight: 1 }}>{value}</div></div>); }

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState("login");
  const [tab, setTab] = useState("game");
  const [groupName, setGroupName] = useState("Wölfe");
  const [isGuest, setIsGuest] = useState(false);
  const [showGuestSave, setShowGuestSave] = useState(false);
  const [loginError, setLoginError] = useState("");
  const [duration, setDuration] = useState(60);
  const [locations, setLocations] = useState(Math.max(1, Number(LOCATIONS?.length) || 0));
  const [ppl, setPpl] = useState(100);
  const [score, setScore] = useState(420);
  const [found, setFound] = useState(3);
  const total = locations;
  const [timer, setTimer] = useState(1834);
  const [locationStartTimer, setLocationStartTimer] = useState(1834);
  const [roundOrder, setRoundOrder] = useState(() => buildShuffledIndices(LOCATIONS.length));
  const [roundPos, setRoundPos] = useState(0);
  const [hintsUsed, setHintsUsed] = useState(0);
  const [hintOpen, setHintOpen] = useState(false);
  const [skipOpen, setSkipOpen] = useState(false);
  const [gpsState, setGpsState] = useState(null);
  const [gpsErrorDistance, setGpsErrorDistance] = useState(null);

  const currentLoc = useMemo(() => {
    if (!LOCATIONS.length) return null;
    if (!roundOrder.length) return LOCATIONS[0];
    const idx = roundOrder[Math.max(0, Math.min(roundPos, roundOrder.length - 1))];
    return LOCATIONS[idx] || LOCATIONS[0];
  }, [roundOrder, roundPos]);

  const [teams, setTeams] = useState(TEAMS_INITIAL);
  const myRank = useMemo(() => teams.filter(team => team.name !== groupName && team.score > score).length + 1, [teams, score, groupName]);

  const advanceToNextLocation = () => {
    if (!LOCATIONS.length) return;
    if (!roundOrder.length || roundPos >= roundOrder.length - 1) {
      setRoundOrder(buildShuffledIndices(LOCATIONS.length));
      setRoundPos(0);
      return;
    }
    setRoundPos((pos) => pos + 1);
  };
  
  // Session tracking
  const sessionRef = useRef(null);

  // Load teams from localStorage on mount
  useEffect(() => {
    try {
      const raw = localStorage.getItem("scoutquest.teams.v1");
      if (raw) {
        const parsed = JSON.parse(raw);
        const filtered = parsed.filter(t => t.name && t.name.trim()).sort((a, b) => (b.score ?? b.points ?? 0) - (a.score ?? a.points ?? 0));
        const ranked = filtered.map((t, i) => ({ ...t, score: t.score ?? t.points ?? 0, rank: i + 1, live: true, you: false, guest: t.guest === true }));
        setTeams(ranked);
      }
    } catch (e) { console.error(e); }
  }, []);
  
  useEffect(() => {
    if (screen !== "app") return;
    const id = setInterval(() => setTimer(x => Math.max(0, x - 1)), 1000);
    return () => clearInterval(id);
  }, [screen]);

  useEffect(() => {
    if (screen !== "app") return;
    if (timer <= 0) {
      setScreen("complete");
    }
  }, [timer, screen]);
  
  useEffect(() => {
    if (screen !== "app") return;
    if (t.gameState === "idle") { setGpsState(null); }
    if (t.gameState === "checking") { setGpsState("checking"); }
    if (t.gameState === "success") { setGpsState("success"); }
    if (t.gameState === "error") { setGpsState("error"); }
  }, [t.gameState, screen]);
  
  // Save session when game completes
  useEffect(() => {
    if (screen === "complete" && sessionRef.current) {
      saveSession(sessionRef.current, groupName, score, found, total, timer);
      sessionRef.current = null;
    }
  }, [screen, groupName, score, found, total, timer]);
  
  const handleLogin = (name, password) => {
    setLoginError("");
    const teamName = (name || "").trim();
    const pwd = (password || "").trim();
    
    if (!teamName) {
      setLoginError("Bitte einen Teamnamen eingeben.");
      return;
    }
    if (!pwd) {
      setLoginError("Bitte ein Passwort eingeben.");
      return;
    }
    
    // Load teams from admin app
    let teams = [];
    try {
      const raw = localStorage.getItem("scoutquest.teams.v1");
      if (raw) teams = JSON.parse(raw);
    } catch (e) { }
    
    // Find team with matching name
    const team = teams.find(t => String(t.name || "").trim().toLowerCase() === teamName.toLowerCase());
    
    if (!team) {
      setLoginError("Team nicht gefunden. Bitte mit der Admin-App registrieren.");
      return;
    }
    
    // Check password
    if (String(team.password || "") !== pwd) {
      setLoginError("Passwort falsch.");
      return;
    }
    
    // Success
    setGroupName(teamName);
    setIsGuest(false);
    setScreen("setup");
  };
  
  const handleGuest = () => { setLoginError(""); setGroupName("Gast"); setIsGuest(true); setScreen("setup"); };
  const handleLogout = () => { setLoginError(""); setScreen("complete"); };
  const handleStartGame = ({ duration: d, locations: l, ppl: p }) => {
    setDuration(d);
    setLocations(l);
    setPpl(p);
    setFound(0);
    setScore(0);
    setTimer(d * 60);
    setLocationStartTimer(d * 60);
    setRoundOrder(buildShuffledIndices(LOCATIONS.length));
    setRoundPos(0);
    setScreen("app");
    setTab("game");
    
    // Start session tracking
    sessionRef.current = {
      teamName: groupName,
      isGuest: isGuest,
      startTime: Date.now(),
      endTime: null,
      duration: 0,
      locationsTarget: l,
      photosCount: 0,
      pointsEarned: 0,
      initialScore: 0
    };
  };
  const handleCheckGps = async () => {
    if (!LOCATIONS.length) { setGpsErrorDistance(null); setTweak("gameState", "error"); return; }
    setGpsErrorDistance(null); setTweak("gameState", "checking");
    if (hasTargetGps(currentLoc)) {
      try {
        const pos = await getCurrentPosition();
        const target = normalizeCoordinates(currentLoc.lat, currentLoc.lon);
        const position = normalizeCoordinates(pos.coords.latitude, pos.coords.longitude);
        if (!Number.isFinite(target.lat) || !Number.isFinite(target.lon) || !Number.isFinite(position.lat) || !Number.isFinite(position.lon)) {
          throw new Error("GPS-Daten ungueltig");
        }
        const distance = haversineMeters(target.lat, target.lon, position.lat, position.lon);
        setGpsErrorDistance(distance);
        setTweak("gameState", distance <= 20 ? "success" : "error");
      } catch (err) { setGpsErrorDistance(null); setTweak("gameState", "error"); }
      return;
    }
    setTimeout(() => { const win = Math.random() > 0.35; setTweak("gameState", win ? "success" : "error"); }, 1800);
  };
  
  function saveSession(session, finalGroupName, finalScore, finalFound, finalTotal, finalTimer) {
    const sessionData = {
      id: Date.now(),
      teamName: finalGroupName,
      isGuest: session.isGuest,
      startTime: session.startTime,
      endTime: Date.now(),
      durationSeconds: finalTimer,
      locationsTarget: finalTotal,
      locationsFound: finalFound,
      pointsEarned: finalScore,
      timestamp: new Date().toISOString(),
      date: new Date().toISOString().split("T")[0]
    };
    
    try {
      let sessions = [];
      const raw = localStorage.getItem("scoutquest.sessions.v1");
      if (raw) {
        try { sessions = JSON.parse(raw); } catch (e) { sessions = []; }
      }
      sessions.push(sessionData);
      localStorage.setItem("scoutquest.sessions.v1", JSON.stringify(sessions));
    } catch (err) {
      console.error("Session save failed:", err);
    }
  }
  
  const closeOverlay = () => {
    if (gpsState === "success") { const elapsed = Math.max(0, locationStartTimer - timer); const bonus = elapsed < 120 ? 50 : 0; setScore(s => s + 100 + bonus); setFound(f => f + 1); advanceToNextLocation(); setLocationStartTimer(timer); setHintsUsed(0); }
    setGpsErrorDistance(null); setTweak("gameState", "idle");
  };
  const handleSkipConfirm = () => { setSkipOpen(false); setScore(s => s - 150); advanceToNextLocation(); setLocationStartTimer(timer); setHintsUsed(0); };
  const handleUseHint = () => { if (hintsUsed < 2) { setHintsUsed(h => h + 1); setScore(s => s - 30); } };
  let body;
  if (screen === "login") body = <LoginScreen onLogin={handleLogin} onGuest={handleGuest} loginError={loginError} />;
  else if (screen === "setup") body = <SetupScreen groupName={groupName} initialDuration={duration} initialLocations={locations} onStart={handleStartGame} onBack={() => { setLoginError(""); setScreen("login"); }} />;
  else if (screen === "complete") body = <CompleteScreen groupName={groupName} score={score} found={found} total={total} time={fmt(Math.max(0, duration * 60 - timer))} rank={myRank} isGuest={isGuest} onOpenGuestSave={() => setShowGuestSave(true)} onRestart={() => { setScreen("setup"); setFound(0); setScore(0); setTimer(0); setRoundOrder(buildShuffledIndices(LOCATIONS.length)); setRoundPos(0); }} />;
  else {
    const tabBody = tab === "game" ? <GameScreen groupName={groupName} score={score} found={found} total={total} timer={timer} rank={myRank} currentLoc={currentLoc} photoStyle={t.photoStyle} buttonSize={t.buttonSize} hintsUsed={hintsUsed} onOpenHint={() => setHintOpen(true)} onSkip={() => setSkipOpen(true)} onCheckGps={handleCheckGps} /> : tab === "ranking" ? <RankingScreen groupName={groupName} isGuest={isGuest} teams={teams} /> : <ProfileScreen groupName={groupName} score={score} found={found} total={total} soundOn={t.soundOn} onToggleSound={(v) => setTweak("soundOn", v)} onLogout={handleLogout} />;
    body = (<div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column" }}><div style={{ flex: 1, position: "relative", overflow: "hidden" }}>{tabBody}</div><BottomNav tab={tab} onChange={setTab} /><HintSheet open={hintOpen} loc={currentLoc || LOCATIONS[0] || DEFAULT_LOCATIONS[0]} hintsUsed={hintsUsed} onUseHint={handleUseHint} onClose={() => setHintOpen(false)} /><SkipDialog open={skipOpen} onCancel={() => setSkipOpen(false)} onConfirm={handleSkipConfirm} /><GpsOverlay state={gpsState} onClose={closeOverlay} errorDistance={gpsErrorDistance} successElapsed={Math.max(0, locationStartTimer - timer)} /></div>);
  }
  return (<>{body}<GuestSaveSheet open={showGuestSave} groupName={groupName} score={score} found={found} total={total} onClose={() => setShowGuestSave(false)} onSaved={(savedName, savedMode, savedPw) => { const elapsedSec = Math.max(0, duration * 60 - timer); const timeStr = fmt(elapsedSec); const finalName = savedName && savedName.trim() ? savedName.trim() : (groupName || "Gast"); const isRegister = savedMode === "register"; const others = teams.filter(t => t.name !== finalName); const newTeamId = Date.now(); const newTeam = { id: newTeamId, name: finalName, score, found, time: timeStr, live: false, you: false, guest: true, password: isRegister ? (savedPw || "") : "" }; const updated = [...others, newTeam].sort((a, b) => b.score - a.score).map((t, i) => ({ ...t, rank: i + 1 })); localStorage.setItem("scoutquest.teams.v1", JSON.stringify(updated)); setTeams(updated); if (isRegister) { try { const raw = localStorage.getItem("scoutquest.guest-requests.v1"); const reqs = raw ? JSON.parse(raw) : []; reqs.push({ type: "register", teamId: newTeamId, name: finalName, password: savedPw || "", score, found, requestedAt: new Date().toISOString() }); localStorage.setItem("scoutquest.guest-requests.v1", JSON.stringify(reqs)); } catch(e) { console.error(e); } } setGroupName(finalName); setIsGuest(true); setShowGuestSave(false); setScreen("app"); setTab("ranking"); }} /><TweaksPanel title="ScoutQuest"><TweakSection label="Game state" /><TweakRadio label="Status" value={t.gameState} options={["idle", "checking", "success", "error"]} onChange={(v) => setTweak("gameState", v)} /><div style={{ fontSize: 10.5, color: "rgba(41,38,27,.55)", lineHeight: 1.4 }}>Springt direkt in den GPS-Check, Erfolg oder Fehler.</div><TweakSection label="Look & feel" /><TweakRadio label="Foto" value={t.photoStyle} options={["real", "placeholder"]} onChange={(v) => setTweak("photoStyle", v)} /><TweakRadio label="Hauptbutton" value={t.buttonSize} options={["medium", "large", "huge"]} onChange={(v) => setTweak("buttonSize", v)} /><TweakSection label="Audio" /><TweakToggle label="Sounds aktiv" value={t.soundOn} onChange={(v) => setTweak("soundOn", v)} /><TweakSection label="Navigation" /><TweakSelect label="Screen" value={screen === "app" ? tab : screen} options={["login", "setup", "game", "ranking", "profile", "complete"]} onChange={(v) => { if (v === "login") { setScreen("login"); } else if (v === "setup") { setScreen("setup"); } else if (v === "complete") { setScreen("complete"); } else { setScreen("app"); setTab(v); } }} /></TweaksPanel></>);
}

function GuestSaveSheet({ open, groupName, score, found, total, onClose, onSaved }) {
  const [step, setStep] = useState("choose"); const [name, setName] = useState(groupName === "Gast" ? "" : groupName); const [pw, setPw] = useState(""); const [pw2, setPw2] = useState(""); const [mode, setMode] = useState(null);
  useEffect(() => { if (open) { setStep("choose"); setMode(null); setName(groupName === "Gast" ? "" : groupName); setPw(""); setPw2(""); } }, [open, groupName]);
  if (!open) return null;
  const nameValid = name.trim().length >= 2; const pwValid = pw.length >= 4 && pw === pw2;
  return (<div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(20,24,26,.7)", backdropFilter: "blur(10px)", zIndex: 40, display: "flex", alignItems: "flex-end", animation: "screenIn .25s ease" }}><div onClick={(e) => e.stopPropagation()} style={{ width: "100%", background: "var(--paper)", borderRadius: "24px 24px 0 0", padding: "16px 22px 24px", boxShadow: "0 -10px 30px -10px rgba(20,24,26,.4)", animation: "screenIn .35s cubic-bezier(.2,.9,.3,1.1)", maxHeight: "92%", overflowY: "auto" }}><div style={{ width: 44, height: 5, background: "var(--sand-2)", borderRadius: 99, margin: "0 auto 14px" }}/>{step === "choose" && (<><div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}><div style={{ width: 42, height: 42, borderRadius: 13, background: "var(--neon)", color: "var(--forest)", display: "grid", placeItems: "center" }}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg></div><div><div className="display" style={{ fontSize: 22, color: "var(--forest)" }}>Ergebnis sichern</div><div style={{ fontSize: 12, color: "var(--ink-2)", fontWeight: 600 }}>Wie möchtet ihr weitermachen?</div></div></div><div className="papery-dark" style={{ padding: "12px 14px", borderRadius: 16, color: "var(--paper)", marginBottom: 14, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}><Mini label="Punkte" value={score} accent="var(--neon)" /><Mini label="Gefunden" value={`${found}/${total}`} accent="var(--gold)" /><Mini label="Status" value="Gast" accent="var(--orange)" /></div><button onClick={() => { setMode("save"); setStep("saveName"); }} style={optionBtn(false)}><OptIcon><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg></OptIcon><div style={{ textAlign: "left", flex: 1 }}><div className="display" style={{ fontSize: 17, color: "var(--forest)" }}>Nur Ergebnis speichern</div><div style={{ fontSize: 12, color: "var(--ink-2)", fontWeight: 600, marginTop: 2 }}>Erscheint im Ranking als Gast-Team</div></div></button><button onClick={() => { setMode("register"); setStep("register"); }} style={optionBtn(true)}><OptIcon highlight><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg></OptIcon><div style={{ textAlign: "left", flex: 1 }}><div className="display" style={{ fontSize: 17, color: "var(--paper)" }}>Speichern + Profil anlegen</div><div style={{ fontSize: 12, color: "rgba(250,245,230,.7)", fontWeight: 600, marginTop: 2 }}>Gruppe registrieren mit Passwort</div></div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--paper)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg></button><button onClick={onClose} style={{ width: "100%", marginTop: 12, background: "transparent", border: 0, color: "var(--ink-2)", padding: "10px", fontFamily: "var(--font-body)", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Verwerfen und beenden</button></>)}{step === "register" && (<><div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}><button onClick={() => setStep("choose")} style={{ width: 32, height: 32, borderRadius: 10, background: "var(--paper-2)", border: 0, cursor: "pointer", color: "var(--ink)", display: "grid", placeItems: "center" }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button><div><div className="display" style={{ fontSize: 22, color: "var(--forest)" }}>Profil anlegen</div><div style={{ fontSize: 12, color: "var(--ink-2)", fontWeight: 600 }}>Damit eure Gruppe wiederkommen kann</div></div></div><div style={{ display: "flex", flexDirection: "column", gap: 10 }}><LightField label="Gruppenname" value={name} onChange={setName} placeholder="z.B. Sommerlager 2026" valid={nameValid} hint="mind. 2 Zeichen" /><LightField label="Passwort" value={pw} onChange={setPw} placeholder="••••••" type="password" valid={pw.length >= 4} hint="mind. 4 Zeichen" /><LightField label="Passwort bestätigen" value={pw2} onChange={setPw2} placeholder="••••••" type="password" valid={pw2.length >= 4 && pw === pw2} hint={pw2.length > 0 && pw !== pw2 ? "Passwörter stimmen nicht überein" : "muss übereinstimmen"} /></div><div style={{ marginTop: 12, padding: 12, borderRadius: 14, background: "var(--paper-2)", fontSize: 12, color: "var(--ink-2)", fontWeight: 600, display: "flex", gap: 8 }}><span style={{ fontSize: 16 }}>🔒</span><span>Eure Daten bleiben in der App, kein Tracking, kein Standort-Teilen.</span></div><button onClick={() => { if (nameValid && pwValid) setStep("saved"); }} disabled={!(nameValid && pwValid)} className="btn-primary" style={{ marginTop: 14, background: "var(--forest)", color: "var(--paper)", boxShadow: "0 4px 0 #0E2218, 0 12px 24px -8px rgba(31,58,43,.5)", opacity: (nameValid && pwValid) ? 1 : .5 }}>Profil erstellen</button></>)}{step === "saveName" && (<><div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}><button onClick={() => setStep("choose")} style={{ width: 32, height: 32, borderRadius: 10, background: "var(--paper-2)", border: 0, cursor: "pointer", color: "var(--ink)", display: "grid", placeItems: "center" }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button><div><div className="display" style={{ fontSize: 22, color: "var(--forest)" }}>Gruppenname</div><div style={{ fontSize: 12, color: "var(--ink-2)", fontWeight: 600 }}>Unter welchem Namen soll euer Ergebnis ins Ranking?</div></div></div><div className="papery-dark" style={{ padding: "12px 14px", borderRadius: 16, color: "var(--paper)", marginBottom: 14, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}><Mini label="Punkte" value={score} accent="var(--neon)" /><Mini label="Gefunden" value={found} accent="var(--gold)" /><Mini label="Status" value="Gast" accent="var(--orange)" /></div><LightField label="Gruppenname" value={name} onChange={setName} placeholder="z.B. Sommerlager 2026" valid={nameValid} hint="mind. 2 Zeichen" /><div style={{ marginTop: 12, padding: 12, borderRadius: 14, background: "var(--paper-2)", fontSize: 12, color: "var(--ink-2)", fontWeight: 600, display: "flex", gap: 8 }}><span style={{ fontSize: 16 }}>👥</span><span>Erscheint im Ranking als <b style={{ color: "var(--ink)" }}>Gast-Team</b>. Ohne Passwort – das Profil bleibt nicht erhalten.</span></div><button onClick={() => { if (nameValid) setStep("saved"); }} disabled={!nameValid} className="btn-primary" style={{ marginTop: 14, background: "var(--neon)", color: "var(--forest)", boxShadow: "0 4px 0 #2EB85F, 0 12px 24px -8px rgba(91,229,132,.4)", opacity: nameValid ? 1 : .5 }}>Ergebnis speichern</button></>)}{step === "saved" && (<><div style={{ display: "grid", placeItems: "center", padding: "16px 0 8px" }}><div style={{ width: 84, height: 84, borderRadius: "50%", background: "var(--neon)", color: "var(--forest)", display: "grid", placeItems: "center", boxShadow: "0 0 0 10px rgba(91,229,132,.18)", animation: "pop .45s cubic-bezier(.2,.9,.3,1.2)" }}><svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg></div></div><div className="display" style={{ fontSize: 24, color: "var(--forest)", textAlign: "center", marginTop: 4 }}>{mode === "register" ? "Profil angelegt!" : "Ergebnis gespeichert"}</div><div style={{ fontSize: 13, color: "var(--ink-2)", fontWeight: 600, textAlign: "center", marginTop: 6, padding: "0 16px" }}>{mode === "register" ? <>Ihr seid jetzt als <b style={{ color: "var(--forest)" }}>{name}</b> registriert. Beim nächsten Login einfach Name + Passwort eingeben.</> : <>Euer Ergebnis erscheint im Ranking als Gast-Team unter dem Namen <b style={{ color: "var(--forest)" }}>{name || groupName}</b>.</>}</div><button onClick={() => onSaved(name || groupName, mode, pw)} className="btn-primary" style={{ marginTop: 18, background: "var(--neon)", color: "var(--forest)", boxShadow: "0 4px 0 #2EB85F, 0 12px 24px -8px rgba(91,229,132,.4)" }}>Zum Ranking →</button></>)}</div></div>);
}
function optionBtn(highlight) { return { width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "14px 14px", marginBottom: 10, background: highlight ? "var(--forest)" : "var(--paper)", border: highlight ? "0" : "1.5px solid rgba(20,24,26,.10)", borderRadius: 18, cursor: "pointer", boxShadow: highlight ? "0 4px 0 #0E2218, 0 12px 22px -10px rgba(31,58,43,.45)" : "0 1px 0 rgba(20,24,26,.04)", textAlign: "left" }; }
function OptIcon({ children, highlight }) { return (<div style={{ width: 40, height: 40, borderRadius: 12, background: highlight ? "var(--neon)" : "var(--paper-2)", color: "var(--forest)", display: "grid", placeItems: "center", flexShrink: 0 }}>{children}</div>); }
function Mini({ label, value, accent }) { return (<div><div style={{ fontSize: 9, color: "rgba(250,245,230,.55)", letterSpacing: ".12em", textTransform: "uppercase", fontWeight: 700 }}>{label}</div><div className="mono" style={{ fontSize: 18, fontWeight: 700, color: accent, lineHeight: 1.1, marginTop: 2 }}>{value}</div></div>); }
function LightField({ label, value, onChange, placeholder, type = "text", valid, hint }) {
  const touched = value.length > 0;
  return (<label style={{ display: "block", background: "var(--paper-2)", border: `1.5px solid ${touched ? (valid ? "rgba(91,229,132,.55)" : "rgba(230,57,70,.45)") : "transparent"}`, borderRadius: 14, padding: "10px 14px", transition: "border-color .15s ease" }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}><div style={{ fontSize: 10, color: "var(--ink-2)", letterSpacing: ".12em", textTransform: "uppercase", fontWeight: 700 }}>{label}</div>{touched && <div style={{ fontSize: 10, color: valid ? "var(--neon-d)" : "var(--red)", fontWeight: 700 }}>{valid ? "✓ OK" : hint}</div>}</div><input type={type} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} style={{ width: "100%", marginTop: 2, background: "transparent", border: 0, outline: 0, color: "var(--ink)", fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 17 }}/></label>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
